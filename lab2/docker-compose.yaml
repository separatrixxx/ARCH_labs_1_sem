services:
  user-service:
    image: profi-services:latest
    build: .
    command: ["./build/user_service", "--config", "configs/user-service/static_config.yaml"]
    ports:
      - "8081:8081"
    restart: unless-stopped

  catalog-service:
    image: profi-services:latest
    command: ["./build/catalog_service", "--config", "configs/catalog-service/static_config.yaml"]
    ports:
      - "8082:8082"
    restart: unless-stopped

  order-service:
    image: profi-services:latest
    command: ["./build/order_service", "--config", "configs/order-service/static_config.yaml"]
    ports:
      - "8083:8083"
    depends_on:
      - catalog-service
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - catalog-service
      - order-service
    restart: unless-stopped
