components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
            thread_name: main-worker
        fs-task-processor:
            worker_threads: 2
            thread_name: fs-worker
    default_task_processor: main-task-processor

    components:
        server:
            listener:
                port: 8080
                task_processor: main-task-processor

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard

        tracer:
            service-name: profi-service

        statistics-storage: {}

        dynamic-config:
            fs-cache-path: ''
            fs-task-processor: fs-task-processor

        storage-component: {}

        handler-auth-register:
            path: /api/v1/auth/register
            method: POST
            task_processor: main-task-processor

        handler-auth-login:
            path: /api/v1/auth/login
            method: POST
            task_processor: main-task-processor

        handler-users:
            path: /api/v1/users
            method: GET
            task_processor: main-task-processor

        handler-services:
            path: /api/v1/services
            method: GET,POST
            task_processor: main-task-processor

        handler-service-by-id:
            path: /api/v1/services/{id}
            method: GET
            task_processor: main-task-processor

        handler-orders:
            path: /api/v1/orders
            method: GET,POST
            task_processor: main-task-processor

        handler-order-by-id:
            path: /api/v1/orders/{id}
            method: GET
            task_processor: main-task-processor

        handler-order-services:
            path: /api/v1/orders/{order_id}/services
            method: POST
            task_processor: main-task-processor

        handler-swagger-ui:
            path: /swagger
            method: GET
            task_processor: main-task-processor

        handler-openapi:
            path: /openapi.yaml
            method: GET
            task_processor: main-task-processor
